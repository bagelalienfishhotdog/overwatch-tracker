<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVERWATCH // Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #060a0d;
  --panel: #0b1210;
  --panel-2: #0f1c18;
  --border: #1a3828;
  --border-light: #244535;
  --green: #34e58f;
  --green-dim: #1c6b46;
  --green-glow: rgba(52, 229, 143, 0.2);
  --amber: #ffb020;
  --red: #ff5d5d;
  --text: #d4ede1;
  --text-dim: #5e8a76;
  --text-muted: #3a5a4a;
  --mono: 'IBM Plex Mono', 'Courier New', monospace;
  --sans: 'IBM Plex Sans', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.login-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.login-card {
  width: 340px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 28px 24px 24px;
}

.login-brand {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}
.login-brand-mark { color: var(--green); font-size: 16px; text-shadow: 0 0 6px var(--green-glow); }
.login-brand-name {
  font-family: var(--mono);
  font-weight: 700;
  letter-spacing: 2px;
  font-size: 14px;
}
.login-brand-sub {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--text-dim);
  padding-left: 6px;
  border-left: 1px solid var(--border);
}

.field { margin-bottom: 12px; }
.field label {
  display: block;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.field input {
  width: 100%;
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  border-radius: 3px;
  outline: none;
  transition: border-color 0.15s;
}
.field input::placeholder { color: var(--text-muted); }
.field input:focus { border-color: var(--green-dim); }
.field input.code-input {
  font-size: 14px;
  letter-spacing: 2px;
  text-align: center;
}

.btn-login {
  width: 100%;
  background: var(--green-dim);
  color: #06120c;
  border: none;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 1.5px;
  padding: 10px 0;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-login:hover { background: var(--green); }

.error-msg {
  display: none;
  margin-bottom: 12px;
  padding: 8px 10px;
  background: rgba(255, 93, 93, 0.1);
  border: 1px solid rgba(255, 93, 93, 0.25);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--red);
  letter-spacing: 0.5px;
}
.error-msg.visible { display: block; }

.login-footer {
  text-align: center;
  margin-top: 16px;
}
.login-footer a {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  text-decoration: none;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: color 0.15s;
}
.login-footer a:hover { color: var(--green); }

.admin-fields { display: none; }
.admin-fields.visible { display: block; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-brand">
      <span class="login-brand-mark">&#9678;</span>
      <span class="login-brand-name">OVERWATCH</span>
      <span class="login-brand-sub">MAP TRACKER</span>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <div class="field">
      <label id="label-main">ACCESS CODE</label>
      <input id="input-main" type="text" class="code-input" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" autofocus>
    </div>

    <div id="admin-fields" class="admin-fields">
      <div class="field">
        <label>PASSWORD</label>
        <input id="input-pass" type="password" autocomplete="current-password">
      </div>
    </div>

    <button id="btn-submit" class="btn-login">ENTER</button>

    <div class="login-footer">
      <a id="toggle-mode">Admin Login</a>
    </div>

  </div>
</div>

<script>
(function () {
  const errorEl = document.getElementById('error-msg');
  const btnSubmit = document.getElementById('btn-submit');
  const toggleMode = document.getElementById('toggle-mode');
  const adminFields = document.getElementById('admin-fields');
  const labelMain = document.getElementById('label-main');
  const inputMain = document.getElementById('input-main');
  const inputPass = document.getElementById('input-pass');

  let isAdminMode = false;

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('visible');
  }

  function hideError() {
    errorEl.classList.remove('visible');
  }

  toggleMode.addEventListener('click', function () {
    isAdminMode = !isAdminMode;
    hideError();
    if (isAdminMode) {
      adminFields.classList.add('visible');
      labelMain.textContent = 'USERNAME';
      inputMain.classList.remove('code-input');
      inputMain.placeholder = 'admin';
      inputMain.autocomplete = 'username';
      btnSubmit.textContent = 'LOGIN';
      toggleMode.textContent = 'Back to Access Code';
    } else {
      adminFields.classList.remove('visible');
      labelMain.textContent = 'ACCESS CODE';
      inputMain.classList.add('code-input');
      inputMain.placeholder = 'XXXX-XXXX-XXXX-XXXX';
      inputMain.autocomplete = 'off';
      btnSubmit.textContent = 'ENTER';
      toggleMode.textContent = 'Admin Login';
    }
    inputMain.value = '';
    inputPass.value = '';
  });

  function handleSubmit() {
    hideError();
    const mainValue = inputMain.value.trim();

    if (!mainValue) {
      showError(isAdminMode ? 'Username is required.' : 'Access code is required.');
      return;
    }

    if (isAdminMode) {
      const password = inputPass.value;
      if (!password) {
        showError('Password is required.');
        return;
      }
      doLogin(mainValue, password);
    } else {
      doAccess(mainValue);
    }
  }

  btnSubmit.addEventListener('click', handleSubmit);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') handleSubmit();
  });

  async function doAccess(code) {
    try {
      const res = await fetch('/api/auth/access', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });
      const data = await res.json();
      if (res.ok && data.token) {
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', JSON.stringify(data.user));
        window.location.href = '/';
      } else {
        showError(data.error || 'Invalid access code.');
      }
    } catch {
      showError('Connection error.');
    }
  }

  async function doLogin(username, password) {
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok && data.token) {
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', JSON.stringify(data.user));
        window.location.href = '/';
      } else {
        showError(data.error || 'Login failed.');
      }
    } catch {
      showError('Connection error.');
    }
  }
})();
</script>

</body>
</html>
